<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register | resolveIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Register to resolveIT — Women's Grievance Redressal System">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>

<body class="auth-body">

    <nav class="custom-navbar">
        <div class="container d-flex align-items-center">

            <div class="d-flex align-items-center gap-2 brand-wrapper">
                <div class="logo-circle">
                    <img src="assets/images/logo.png" alt="resolveIT">
                </div>
                <span class="brand-text">resolveIT</span>
            </div>

        </div>
    </nav>
    <!-- REGISTER CARD -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div style="font-size:40px;margin-bottom:8px"></div>
                <h4 class="auth-title">Create Account</h4>
                <p class="auth-subtitle">Register as a complainant to report grievances</p>
            </div>

            <form id="registerForm">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="fullname" class="form-control" placeholder="Your full name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="mb-3 position-relative">
                    <label class="form-label">Password</label>
                    <input type="password" id="regPassword" class="form-control pe-5" placeholder="Min. 6 characters"
                        required>
                    <i class="bi bi-eye-slash toggle-password position-absolute end-0 top-50 me-3 mt-1"
                        style="cursor: pointer; color: #6c757d; font-size: 1.1rem; transform: translateY(-10%);"></i>
                </div>

                <div class="mb-4 position-relative">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control pe-5" placeholder="Repeat password"
                        required>
                    <i class="bi bi-eye-slash toggle-password position-absolute end-0 top-50 me-3 mt-1"
                        style="cursor: pointer; color: #6c757d; font-size: 1.1rem; transform: translateY(-10%);"></i>
                </div>

                <button type="submit" class="custom-btn w-100">
                    Create Account →
                </button>

            </form>

            <div class="text-center mt-4">
                <small class="text-muted">Already have an account? <a href="login.html">Login here</a></small>
            </div>

            <div class="text-center mt-3">
                <small class="text-muted" style="font-size:11px">
                    🛡️ POSH compliant · 🔒 Confidential · ⚡ Secure
                </small>
            </div>
        </div>
    </div>
    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        © 2026 resolveIT | Women Harassment Grievance Redressal System<br>
        <small style="opacity:0.7">🛡️ POSH Compliant &nbsp;|&nbsp; 🔒 Confidential &nbsp;|&nbsp; ⚡ Secure</small>
    </footer>
    <script src="assets/auth.js"></script>

</body>

</html>
