<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Messages | resolveIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/style.css">
    <!-- FIX 1: Removed <script src="../assets/messages.js"> — file doesn't exist and blocked page load -->
    <style>
        .messages-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: calc(100vh - 100px);
        }

        .chat-list-panel {
            background: var(--card-bg, #fff);
            border-radius: 16px;
            border: 1px solid var(--border-color, #e8e8f0);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-list-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border-color, #e8e8f0);
        }

        .chat-list-header h6 {
            font-weight: 700;
            margin: 0;
            font-size: 15px;
        }

        .chat-list-body {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color, #f0f0f8);
            transition: background 0.15s;
            position: relative;
        }

        .chat-item:hover { background: #f7f5ff; }

        .chat-item.active {
            background: #f0ebff;
            border-left: 3px solid #7c3aed;
        }

        .chat-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
        }

        .chat-avatar.committee {
            background: linear-gradient(135deg, #0d9488, #5eead4);
        }

        .chat-meta {
            flex: 1;
            overflow: hidden;
        }

        .chat-meta .chat-name {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta .chat-preview {
            font-size: 12px;
            color: #6b7280;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .chat-meta .chat-case-badge {
            font-size: 10px;
            background: #ede9fe;
            color: #7c3aed;
            border-radius: 4px;
            padding: 1px 6px;
            display: inline-block;
            margin-top: 3px;
            font-weight: 600;
        }

        .chat-unread {
            background: #7c3aed;
            color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-window {
            background: var(--card-bg, #fff);
            border-radius: 16px;
            border: 1px solid var(--border-color, #e8e8f0);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-window-header {
            padding: 16px 22px;
            border-bottom: 1px solid var(--border-color, #e8e8f0);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .chat-window-header .header-info h6 {
            font-weight: 700;
            margin: 0;
            font-size: 15px;
        }

        .chat-window-header .header-info span {
            font-size: 12px;
            color: #6b7280;
        }

        .chat-window-header .case-tag {
            margin-left: auto;
            font-size: 12px;
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            border-radius: 20px;
            padding: 4px 12px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #faf9ff;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #d8d0f0; border-radius: 4px; }

        .date-separator {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #9ca3af;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 6px 0;
        }

        .date-separator::before,
        .date-separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .msg-row.sent { flex-direction: row-reverse; }

        .msg-bubble {
            max-width: 68%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.55;
            position: relative;
            word-break: break-word;
        }

        .msg-row.received .msg-bubble {
            background: #fff;
            border: 1px solid #e8e8f0;
            border-bottom-left-radius: 4px;
            color: #1f1f2e;
        }

        .msg-row.sent .msg-bubble {
            background: linear-gradient(135deg, #7c3aed, #9f67ff);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-time {
            font-size: 10px;
            margin-top: 4px;
            display: block;
            opacity: 0.65;
            text-align: right;
        }

        .msg-row.received .msg-time { text-align: left; }

        .msg-sender-name {
            font-size: 11px;
            font-weight: 600;
            color: #7c3aed;
            margin-bottom: 4px;
        }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0d9488, #5eead4);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .system-msg {
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            background: #f3f4f6;
            border-radius: 20px;
            padding: 5px 14px;
            align-self: center;
            font-style: italic;
        }

        .chat-input-area {
            padding: 14px 18px;
            border-top: 1px solid var(--border-color, #e8e8f0);
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: #fff;
        }

        .chat-input-area textarea {
            flex: 1;
            border: 1.5px solid #e0daff;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
            background: #faf9ff;
        }

        .chat-input-area textarea:focus {
            border-color: #7c3aed;
            background: #fff;
        }

        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #7c3aed, #9f67ff);
            color: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s;
            font-size: 17px;
        }

        .btn-send:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(124, 58, 237, 0.4);
        }

        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            gap: 10px;
            background: #faf9ff;
        }

        .empty-chat i {
            font-size: 48px;
            opacity: 0.3;
        }

        .no-chats {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 8px;
            color: #9ca3af;
            padding: 30px;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }

        @media (max-width: 900px) {
            .messages-layout {
                grid-template-columns: 1fr;
                height: auto;
            }
            .chat-list-panel { max-height: 260px; }
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <!-- SIDEBAR -->
        <div class="sidebar sidebar-complainant">
            <div class="sidebar-brand"></div>
            <div class="sidebar-section-label">Menu</div>
            <a href="dashboard.html">
                <span class="nav-icon"><i class="bi bi-house-fill"></i></span> Dashboard
            </a>
            <a href="submit.html">
                <span class="nav-icon"><i class="bi bi-pencil-square"></i></span> New Complaint
            </a>
            <a href="track.html">
                <span class="nav-icon"><i class="bi bi-search"></i></span> Track Status
            </a>
            <a href="messages.html" class="active">
                <span class="nav-icon"><i class="bi bi-chat-dots-fill"></i></span> Messages
                <span class="ms-auto badge bg-danger rounded-pill" id="sidebarUnreadBadge" style="display:none;font-size:10px;"></span>
            </a>
            <a href="settings.html">
                <span class="nav-icon"><i class="bi bi-gear-fill"></i></span> Settings
            </a>
            <hr class="sidebar-divider">
            <div class="mt-auto">
                <a href="../login.html" onclick="logout()">
                    <span class="nav-icon"><i class="bi bi-box-arrow-right"></i></span> Sign Out
                </a>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="dashboard-content">
            <div class="dashboard-header">
                <div>
                    <h2>Messages</h2>
                    <p class="text-muted mb-0">Communicate with your assigned committee member</p>
                </div>
            </div>

            <div class="messages-layout">
                <div class="chat-list-panel">
                    <div class="chat-list-header">
                        <h6><i class="bi bi-chat-left-text me-2 text-purple"></i>Conversations</h6>
                    </div>
                    <div class="chat-list-body" id="chatList">
                        <div class="loading">Loading conversations...</div>
                    </div>
                </div>

                <div class="chat-window" id="chatWindow">
                    <div class="empty-chat" id="emptyChatState">
                        <i class="bi bi-chat-square-dots"></i>
                        <p>Select a conversation to view messages</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';

        const currentUser = JSON.parse(localStorage.getItem("currentUser"));
        if (!currentUser) window.location.href = "../login.html";

        // FIX 2: Store as number consistently to avoid === type mismatch
        let activeComplaintId = null;
        let refreshInterval = null;

        function getAuthHeaders() {
            const token = localStorage.getItem("authToken");
            return {
                'Content-Type': 'application/json',
                'Authorization': token ? `Bearer ${token}` : ''
            };
        }

        function formatTime(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }

        function formatDate(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(today.getDate() - 1);
            if (d.toDateString() === today.toDateString()) return "Today";
            if (d.toDateString() === yesterday.toDateString()) return "Yesterday";
            return d.toLocaleDateString([], { day: "numeric", month: "short", year: "numeric" });
        }

        function getInitials(name) {
            if (!name) return "?";
            return name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
        }

        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('authToken');
        }

        // ── API CALLS ─────────────────────────────────────────────

        async function fetchComplaints() {
            try {
                // FIX 3: Use correct endpoint with user ID (matches complainant.js)
                const response = await fetch(`${API_BASE_URL}/complaints/my/${currentUser.id}`, {
                    headers: getAuthHeaders()
                });
                if (!response.ok) throw new Error('Failed to fetch complaints');
                return await response.json();
            } catch (error) {
                console.error('Error fetching complaints:', error);
                return [];
            }
        }

        async function fetchMessages(complaintId) {
            try {
                const response = await fetch(
                    `${API_BASE_URL}/messages?complaintId=${complaintId}&requestingUserId=${currentUser.id}`,
                    { headers: getAuthHeaders() }
                );
                if (!response.ok) throw new Error('Failed to fetch messages');
                return await response.json();
            } catch (error) {
                console.error('Error fetching messages:', error);
                return [];
            }
        }

        // FIX 4: Renamed from sendMessage() to avoid collision with the button handler below
        async function postMessage(complaintId, text) {
            const response = await fetch(`${API_BASE_URL}/messages/text`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify({
                    senderId: currentUser.id,
                    complaintId: complaintId,
                    senderRole: "COMPLAINANT",
                    text: text
                })
            });
            if (!response.ok) throw new Error('Failed to send message');
            return await response.json();
        }

        async function markMessagesAsRead(complaintId) {
            try {
                await fetch(`${API_BASE_URL}/messages/read`, {
                    method: 'PUT',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ complaintId: complaintId, readerRole: "COMPLAINANT" })
                });
            } catch (error) {
                console.error('Error marking messages as read:', error);
            }
        }

        async function getUnreadCount(complaintId) {
            try {
                const response = await fetch(
                    `${API_BASE_URL}/messages/unread?complaintId=${complaintId}&readerRole=COMPLAINANT`,
                    { headers: getAuthHeaders() }
                );
                if (!response.ok) return 0;
                const data = await response.json();
                return data.count || 0;
            } catch { return 0; }
        }

        // ── BUILD CONVERSATION LIST ───────────────────────────────

        async function buildConversations() {
            const complaints = await fetchComplaints();
            // Show all complaints, not just assigned ones — unassigned can still have system messages
            const conversations = [];

            for (const complaint of complaints) {
                const unreadCount = await getUnreadCount(complaint.id);
                const messages = await fetchMessages(complaint.id);
                const lastMsg = messages[messages.length - 1];

                conversations.push({
                    // FIX 5: Always store as number
                    complaintId: Number(complaint.id),
                    caseTitle: complaint.title,
                    committeeMemberName: complaint.assignedTo?.name || "Unassigned",
                    lastMessage: lastMsg?.text || "No messages yet",
                    lastTime: lastMsg?.createdAt || complaint.createdAt,
                    unread: unreadCount,
                    hasAssignee: !!complaint.assignedTo
                });
            }

            return conversations.sort((a, b) => new Date(b.lastTime) - new Date(a.lastTime));
        }

        async function renderChatList() {
            const convos = await buildConversations();
            const list = document.getElementById("chatList");

            const totalUnread = convos.reduce((sum, c) => sum + c.unread, 0);
            const sideBadge = document.getElementById("sidebarUnreadBadge");
            if (totalUnread > 0) {
                sideBadge.style.display = "inline-block";
                sideBadge.textContent = totalUnread > 99 ? "99+" : totalUnread;
            } else {
                sideBadge.style.display = "none";
            }

            if (convos.length === 0) {
                list.innerHTML = `
                    <div class="no-chats">
                        <i class="bi bi-chat-square" style="font-size:32px;opacity:0.3"></i>
                        <p style="font-size:13px">No complaints found.<br>File a complaint to start a conversation.</p>
                    </div>`;
                return;
            }

            list.innerHTML = convos.map(c => `
                <div class="chat-item ${c.complaintId === activeComplaintId ? "active" : ""}"
                     onclick="openChat(${c.complaintId})">
                    <div class="chat-avatar committee">${getInitials(c.committeeMemberName)}</div>
                    <div class="chat-meta">
                        <div class="chat-name">${escapeHtml(c.committeeMemberName)}</div>
                        <div class="chat-preview">${escapeHtml(c.lastMessage.substring(0, 50))}${c.lastMessage.length > 50 ? '...' : ''}</div>
                        <span class="chat-case-badge">${escapeHtml(c.caseTitle)}</span>
                    </div>
                    ${c.unread > 0 ? `<div class="chat-unread">${c.unread}</div>` : ""}
                </div>
            `).join("");
        }

        // ── OPEN & RENDER CHAT WINDOW ─────────────────────────────

        async function openChat(complaintId) {
            // FIX 6: Normalize to number on entry
            activeComplaintId = Number(complaintId);
            await markMessagesAsRead(activeComplaintId);
            await renderChatList();
            await renderChatWindow(activeComplaintId);
        }

        async function renderChatWindow(complaintId) {
            const complaints = await fetchComplaints();
            // FIX 7: Compare as numbers
            const complaint = complaints.find(c => Number(c.id) === Number(complaintId));
            if (!complaint) return;

            const messages = await fetchMessages(complaintId);
            const committeeName = complaint.assignedTo?.name || "Committee Member";
            const caseTitle = complaint.title;

            const grouped = {};
            messages.forEach(m => {
                const dateKey = formatDate(m.createdAt);
                if (!grouped[dateKey]) grouped[dateKey] = [];
                grouped[dateKey].push(m);
            });

            const messagesHTML = Object.entries(grouped).map(([date, dayMsgs]) => `
                <div class="date-separator">${date}</div>
                ${dayMsgs.map(m => {
                    const isSent = m.senderRole === "COMPLAINANT";
                    if (m.messageType === "SYSTEM") {
                        return `<div class="system-msg"><i class="bi bi-info-circle me-1"></i>${escapeHtml(m.text)}</div>`;
                    }
                    return `
                        <div class="msg-row ${isSent ? "sent" : "received"}">
                            ${!isSent ? `<div class="msg-avatar">${getInitials(committeeName)}</div>` : ""}
                            <div>
                                ${!isSent ? `<div class="msg-sender-name">${escapeHtml(committeeName)}</div>` : ""}
                                <div class="msg-bubble">
                                    ${m.text ? escapeHtml(m.text) : (m.fileName ? `<i class="bi bi-paperclip"></i> ${escapeHtml(m.fileName)}` : '')}
                                    <span class="msg-time">${formatTime(m.createdAt)}${isSent ? (m.readByCommittee ? ' ✓✓' : ' ✓') : ''}</span>
                                </div>
                            </div>
                        </div>`;
                }).join("")}
            `).join("");

            const windowEl = document.getElementById("chatWindow");
            windowEl.innerHTML = `
                <div class="chat-window-header">
                    <div class="chat-avatar committee">${getInitials(committeeName)}</div>
                    <div class="header-info">
                        <h6>${escapeHtml(committeeName)}</h6>
                        <span><i class="bi bi-shield-check me-1"></i>Committee Member</span>
                    </div>
                    <div class="case-tag">
                        <i class="bi bi-folder2-open me-1"></i>${escapeHtml(caseTitle)}
                    </div>
                </div>
                <div class="chat-messages" id="messagesBody">
                    ${messages.length === 0
                        ? `<div class="empty-chat">
                               <i class="bi bi-chat-dots" style="font-size:40px;opacity:0.2"></i>
                               <p>No messages yet. Send a message to start the conversation.</p>
                           </div>`
                        : messagesHTML
                    }
                </div>
                <div class="chat-input-area">
                    <textarea id="messageInput"
                        placeholder="Type your message…"
                        rows="1"
                        onkeydown="handleKey(event)"
                        oninput="autoResize(this)"></textarea>
                    <button class="btn-send" onclick="handleSend()" title="Send">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>`;

            scrollToBottom();
        }

        // FIX 8: Renamed button handler to handleSend() — no more collision with postMessage()
        async function handleSend() {
            if (!activeComplaintId) return;

            const input = document.getElementById("messageInput");
            const text = input.value.trim();
            if (!text) return;

            const btn = document.querySelector('.btn-send');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner-border spinner-border-sm" style="width:16px;height:16px"></div>';

            try {
                await postMessage(activeComplaintId, text);
                input.value = "";
                input.style.height = "44px";
                await renderChatWindow(activeComplaintId);
                await renderChatList();
            } catch (error) {
                alert("Failed to send message. Please try again.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-send-fill"></i>';
            }
        }

        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        }

        function autoResize(el) {
            el.style.height = "44px";
            el.style.height = Math.min(el.scrollHeight, 120) + "px";
        }

        function scrollToBottom() {
            const body = document.getElementById("messagesBody");
            if (body) body.scrollTop = body.scrollHeight;
        }

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(async () => {
                if (activeComplaintId) {
                    await renderChatWindow(activeComplaintId);
                    await renderChatList();
                }
            }, 5000);
        }

        async function init() {
            await renderChatList();
            startAutoRefresh();

            // Auto-open first conversation
            const convos = await buildConversations();
            if (convos.length > 0 && !activeComplaintId) {
                await openChat(convos[0].complaintId);
            }
        }

        init();
    </script>
</body>
</html>
