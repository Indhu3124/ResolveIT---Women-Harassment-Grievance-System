# ─── Server Port ───────────────────────────────────
server.port=8080

# ─── MySQL Database Connection ─────────────────────
spring.datasource.url=jdbc:mysql://crossover.proxy.rlwy.net:23127/railway
spring.datasource.username=root
spring.datasource.password=EdHYktDXKIqtVYRyufBpaqaAELlpFQNY
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# ─── JPA / Hibernate Configuration ────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Application Name ──────────────────────────────
spring.application.name=resolveIT-backend

# ─── Disable Mail Auto-Configuration (no SMTP needed) ─
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# ─── File Upload Configuration ─────────────────────
# Allow multipart file uploads up to 5MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Folder where uploaded evidence files are stored
file.upload-dir=uploads