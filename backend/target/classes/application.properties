# =====================================================
# resolveIT — Spring Boot Application Configuration
# =====================================================

# ─── Server Port ───────────────────────────────────
server.port=8080

# ─── MySQL Database Connection ─────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/resolveit_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Root_3124
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate Configuration ────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Application Name ──────────────────────────────
spring.application.name=resolveIT-backend

# ─── Disable Mail Auto-Configuration (no SMTP needed) ─
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
# ── File upload settings ──────────────────────────────────────────────
# Where to store uploaded attachments on disk
app.upload.dir=uploads/messages
 
# Max file size per upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Folder where uploaded evidence files are stored
file.upload-dir=uploads