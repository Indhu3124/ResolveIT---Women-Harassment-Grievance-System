<!DOCTYPE html>
<html>
<head>
    <title>Add Committee Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body class="container mt-5">

<h3>Add Committee Member</h3>

<form id="committeeForm">
    <input type="text" id="memberName" class="form-control mb-3" placeholder="Full Name" required>
    <input type="email" id="memberEmail" class="form-control mb-3" placeholder="Email" required>
    <input type="text" id="memberRole" class="form-control mb-3" placeholder="Specialization" required>
    <button class="btn btn-primary">Add Member</button>
</form>

<script src="../assets/admin.js"></script>
<script src="../assets/layout.js"></script>
</body>
</html>
