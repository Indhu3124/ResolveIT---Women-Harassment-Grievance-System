<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Track Complaint | resolveIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/style.css">
</head>

<body>

    <div class="dashboard-layout">

        <!-- SIDEBAR — your version (no Messages link) -->
        <div class="sidebar sidebar-complainant">
            <div class="sidebar-brand"></div>

            <div class="sidebar-section-label">Menu</div>
            <a href="dashboard.html"><span class="nav-icon"><i class="bi bi-house-fill"></i></span> Dashboard</a>
            <a href="submit.html"><span class="nav-icon"><i class="bi bi-pencil-square"></i></span> New Complaint</a>
            <a href="track.html" class="active"><span class="nav-icon"><i class="bi bi-search"></i></span> Track Status</a>
            <a href="settings.html"><span class="nav-icon"><i class="bi bi-gear-fill"></i></span> Settings</a>

            <hr class="sidebar-divider">
            <div class="mt-auto">
                <a href="../login.html" onclick="localStorage.removeItem('currentUser')">
                    <span class="nav-icon"><i class="bi bi-box-arrow-right"></i></span> Sign Out
                </a>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="dashboard-content">

            <div class="dashboard-header">
                <div>
                    <h2>Track Complaint</h2>
                    <p class="text-muted mb-0">Enter your Case ID to check status and updates</p>
                </div>
            </div>

            <!-- SEARCH CARD -->
            <div class="form-card mb-4" style="max-width:100%">
                <label class="form-label"><i class="bi bi-search me-1"></i> Enter Case ID</label>
                <div class="d-flex gap-3">
                    <input type="text" id="trackId" class="form-control"
                        placeholder="e.g., 18"
                        onkeypress="if(event.key==='Enter') trackComplaint()">
                    <button onclick="trackComplaint()" class="custom-btn" style="white-space:nowrap">
                        Track
                    </button>
                </div>
                <small class="text-muted mt-2 d-block">
                    <i class="bi bi-info-circle me-1"></i> Copy your Case ID from the Dashboard table
                </small>
            </div>

            <!-- RESULT — case details + status timeline -->
            <div id="trackResult"></div>

            <!-- CHAT SECTION — hidden until a case is successfully tracked -->
            <div id="chatSection" class="case-card mt-4" style="display:none;">
                <h5 class="mb-3"><i class="bi bi-chat-dots-fill me-2"></i>Communication</h5>
                <div class="chat-box">
                    <div class="chat-messages" id="chatMessages"
                        style="height:400px;overflow-y:auto;padding:15px;background:#faf9ff;border-radius:12px;">
                    </div>
                    <div class="chat-input-area mt-3" style="display:flex;gap:10px;align-items:center;">
                        <textarea id="chatInput" placeholder="Type your message…" rows="1"
                            style="flex:1;padding:10px;border:1px solid #e0daff;border-radius:12px;resize:none;font-size:14px;"
                            onkeypress="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendChatMessage(); }"></textarea>
                        <button class="chat-send-btn" onclick="sendChatMessage()"
                            style="background:linear-gradient(135deg,#7c3aed,#9f67ff);color:white;border:none;border-radius:12px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="../assets/complainant.js"></script>
    <script src="../assets/layout.js"></script>

    <script>
        const currentUser = JSON.parse(localStorage.getItem("currentUser"));
        if (!currentUser) window.location.href = "../login.html";
    </script>

</body>
</html>
