<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard | resolveIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/style.css">
</head>

<body>

    <div class="dashboard-layout">

        <!-- SIDEBAR -->
        <div class="sidebar sidebar-complainant">
            <div class="sidebar-brand">
                
            </div>

            <div class="sidebar-section-label">Menu</div>
            <a href="dashboard.html" class="active">
                <span class="nav-icon"><i class="bi bi-house-fill"></i></span> Dashboard
            </a>
            <a href="submit.html">
                <span class="nav-icon"><i class="bi bi-pencil-square"></i></span> New Complaint
            </a>
            <a href="track.html">
                <span class="nav-icon"><i class="bi bi-search"></i></span> Track Status
            </a>
            <a href="settings.html">
                <span class="nav-icon"><i class="bi bi-gear-fill"></i></span> Settings
            </a>

            <hr class="sidebar-divider">
            <div class="mt-auto">
                <a href="../login.html" onclick="localStorage.removeItem('currentUser')">
                    <span class="nav-icon"><i class="bi bi-box-arrow-right"></i></span> Sign Out
                </a>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="dashboard-content">

            <!-- HEADER -->
            <div class="dashboard-header">
                <div>
                    <h2>My Dashboard</h2>
                    <p class="text-muted mb-0">Welcome back, <span id="username" class="fw-semibold"></span></p>
                </div>
                <a href="submit.html" class="custom-btn">
                    <i class="bi bi-plus-circle-fill me-1"></i> New Complaint
                </a>
            </div>

            <!-- STATS -->
            <div class="stats-grid">
                <div class="stat-card accent-purple">
                    <div class="stat-icon"><i class="bi bi-folder2-open"></i></div>
                    <h3 id="totalCases">0</h3>
                    <p>Total Filed</p>
                </div>
                <div class="stat-card accent-teal">
                    <div class="stat-icon"><i class="bi bi-check-circle-fill"></i></div>
                    <h3 id="resolvedCases">0</h3>
                    <p>Resolved</p>
                </div>
            </div>

            <!-- CASES TABLE -->
            <div class="table-wrapper">
                <div class="filter-row">
                    <h5><i class="bi bi-clipboard2-data me-2"></i>My Complaints</h5>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search…">
                </div>
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Case ID</th>
                            <th>Title</th>
                            <th>Status</th>
                            <th>Priority</th>
                            <th>Assigned To</th>
                            <th>Date &amp; Actions</th>
                        </tr>
                    </thead>
                    <tbody id="complaintTable"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="../assets/complainant.js"></script>
    <script src="../assets/layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const currentUser = JSON.parse(localStorage.getItem("currentUser"));
        if (!currentUser) {
            window.location.href = "../login.html";
        } else {
            document.getElementById("username").innerText = currentUser.name;
        }
    </script>

</body>

</html>
